name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build & publish release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJ MIN PAT <<< "$TAG"
          echo "name=$TAG"                                   >> "$GITHUB_OUTPUT"
          echo "code=$(( MAJ * 10000 + MIN * 100 + PAT ))"  >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ runner.temp }}/release.keystore

      - name: Build release APK
        env:
          VERSION_NAME:      ${{ steps.version.outputs.name }}
          VERSION_CODE:      ${{ steps.version.outputs.code }}
          KEYSTORE_PATH:     ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/levana-v${{ steps.version.outputs.name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.name }}"
          generate_release_notes: true
          files: app/build/outputs/apk/release/levana-v${{ steps.version.outputs.name }}.apk
